spring.application.name=api-gateway
server.port=8000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.netflix.eureka.discovery.enabled=true

# Product Service
spring.cloud.gateway.route[0].id=product-service
spring.cloud.gateway.route[0].uri=lb://product-service
spring.cloud.gateway.route[0].predicates[0]=Path=/products/**
spring.cloud.gateway.route[0].filters[0]=StripPrefix=1

# Order Service
spring.cloud.gateway.route[1].id=order-service
spring.cloud.gateway.route[1].uri=lb://order-service
spring.cloud.gateway.route[1].predicates[0]=Path=/orders/**
spring.cloud.gateway.route[1].filters[0]=StripPrefix=1